rules:
  # Bronze
  action-setup:
    status: exempt
    comment: |
      This integration only exposes read-only sensors and provides no
      service actions of its own.
  appropriate-polling:
    status: done
    comment: |
      DataUpdateCoordinator with a user-configurable scan interval
      (default 30 s) backed by a per-(host, port) asyncio lock so
      multiple coordinators sharing the same gateway never open
      concurrent Modbus TCP connections.
  brands:
    status: done
    comment: |
      The brand/ folder is bundled with the integration so the HA
      Brands CDN is not consulted at runtime; offline-friendly and
      avoids the 30-day 404 cache that the CDN keeps.
  common-modules:
    status: done
    comment: |
      Coordinator + entity base class + typed exception hierarchy live
      in __init__.py, entity.py and errors.py respectively. Sensor
      platform reuses the SunSpecEntity base; CoordinatorEntity is
      used.
  config-flow:
    status: done
    comment: |
      User flow with two steps (host then settings) plus options flow
      and a DHCP discovery step.
  config-flow-test-coverage:
    status: done
    comment: |
      tests/test_config_flow.py covers the user flow happy path,
      every error branch (transport, transient, device), the options
      flow happy path, the empty-models rejection, and a
      voluptuous_serialize regression guard.
  dependency-transparency:
    status: done
    comment: |
      Single dependency pysunspec2[serial], pinned to ==1.3.3 in the
      manifest. Available on PyPI under an open-source licence.
  docs-actions:
    status: exempt
    comment: |
      No service actions, see action-setup.
  docs-high-level-description:
    status: done
  docs-installation-instructions:
    status: done
    comment: |
      README.md ships HACS install instructions plus the manual
      copy-into-config-dir fallback.
  docs-removal-instructions:
    status: done
    comment: |
      README.md "Removing the integration" section.
  entity-event-setup:
    status: exempt
    comment: |
      The integration polls the inverter via Modbus TCP. No external
      event subscriptions to register.
  entity-unique-id:
    status: done
    comment: |
      Stable per-point unique IDs combining config_entry_id, point key,
      model id and model index. See get_sunspec_unique_id().
  has-entity-name:
    status: done
    comment: |
      SunSpecEntity sets _attr_has_entity_name = True (since v0.8.1).
      The per-entity name carries only the point label (e.g. "Watts",
      "DC Voltage") and the device name supplies the make-and-model
      prefix from common model 1's Md field (e.g. "Powador 7.8 TL3"),
      so the user sees "Powador 7.8 TL3 Watts" composed by HA without
      hand-rolled prefix concatenation.
  runtime-data:
    status: done
    comment: |
      v0.9.0 migrated the coordinator handle from
      hass.data[DOMAIN][entry.entry_id] to entry.runtime_data, with a
      ``SunSpec2ConfigEntry`` typed alias so the platforms,
      diagnostics dump and options flow all read it through the
      typed attribute. The legacy ``hass.data[DOMAIN]`` lookup is
      gone from production code (only the test stub coordinator
      still exposes it via a small fallback in
      SunSpecOptionsFlowHandler.async_step_init).
  test-before-configure:
    status: done
    comment: |
      _test_connection in the user flow opens a fresh probe with the
      longer SETUP_TIMEOUT and refuses the form on TransportError /
      ProtocolError / DeviceError / TransientError.
  test-before-setup:
    status: done
    comment: |
      async_config_entry_first_refresh is called from async_setup_entry
      and any failure surfaces as ConfigEntryNotReady so HA can retry
      with backoff.
  unique-config-entry:
    status: done
    comment: |
      The user flow calls async_set_unique_id with the device serial
      number from common model 1, and falls back to host:port:unit_id
      if the device does not provide one.

  # Silver
  action-exceptions:
    status: exempt
    comment: |
      No service actions, see action-setup.
  config-entry-unloading:
    status: done
    comment: |
      async_unload_entry forwards platform unload to HA, then closes
      the modbus client (with the SO_LINGER=0 RST trick on the
      underlying socket so single-slot inverters free their slot
      immediately) and clears the update listener.
  docs-configuration-parameters:
    status: todo
    comment: |
      The README documents the options flow at a high level but does
      not yet have a one-row-per-parameter table. Scheduled for the
      Gold doc pass alongside docs-supported-functions.
  docs-installation-parameters:
    status: done
    comment: |
      README "Installation via HACS" section walks through every
      input the user has to provide on the initial setup form
      (host, port, unit ID, model selection, peak AC power).
  entity-unavailable:
    status: done
    comment: |
      SunSpecEntity.available returns False once
      consecutive_failed_cycles exceeds STALE_DATA_TOLERANCE_CYCLES.
      Below the threshold the entity stays available with the last
      good value (stale-data tolerance), so transient blips do not
      bounce the long-term statistics graphs to "unknown".
  integration-owner:
    status: done
    comment: |
      ``codeowners: ["@hilman2"]`` in manifest.json.
  log-when-unavailable:
    status: done
    comment: |
      The coordinator's _record_error chain logs every failed update
      cycle at WARNING level with a per-category in-a-row counter
      ("TransportError (#3 in a row)"). _after_successful_cycle
      emits a single recovery WARNING when we come back from a
      failed run, so the user can correlate the recovery moment
      against an exact log line.
  parallel-updates:
    status: done
    comment: |
      sensor.py declares ``PARALLEL_UPDATES = 0`` because the
      coordinator already serialises every Modbus read through its
      per-(host, port) asyncio.Lock. Letting HA add a second layer
      of throttling on top would just inflate latency without any
      gain in correctness. The lock is also documented as
      ``_GATEWAY_LOCKS`` in __init__.py for the multi-coordinator
      single-gateway case.
  reauthentication-flow:
    status: exempt
    comment: |
      Modbus TCP has no authentication. Reauth is not applicable.
  test-coverage:
    status: done
    comment: |
      129+ tests covering the config flow (manual + scan + DHCP),
      coordinator (in-cycle retry, stale tolerance, error
      categorisation, fallback paths), discovery helper, sensor
      platform, options flow including the empty-models regression
      guard, migration from cjne/ha-sunspec, and the v0.7.3 ENUM
      bitfield voluptuous_serialize regression. Run with
      ``pytest tests/`` from a WSL Ubuntu uv env.
