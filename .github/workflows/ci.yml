name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check custom_components/ tests/
      - name: Ruff format check
        run: ruff format --check custom_components/ tests/

  hassfest:
    name: Hassfest (HA manifest validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Two-step install to navigate a metadata conflict:
          #
          #   1) pytest-homeassistant-custom-component>=0.13.316 has a hard
          #      pin pytest==9.0.0 in its METADATA, but pytest 9.x changed
          #      the async-fixture handler in a way that breaks the plugin
          #      at runtime. So we let pip resolve pytest-haX with its
          #      full dep set (pulling pytest 9.0.0 transiently) ...
          #
          #   2) ... and then explicitly downgrade pytest to <9 in a
          #      separate pip call, which silently uninstalls 9.0.0 and
          #      installs 8.x. pytest-haX uses very little of pytest's
          #      internals and runs fine on 8.x despite its strict pin.
          #
          # Why pin pytest-haX>=0.13.316: older versions ship a transient
          # aiodns 3.5.0 which has a broken pycares.ares_query_a_result
          # type annotation that fails on import under Python 3.13.
          # 0.13.316 pulls aiodns 4.x which is fine.
          pip install \
            "pytest-homeassistant-custom-component>=0.13.316" \
            pytest-mock \
            "pysunspec2[serial]==1.3.3"
          pip install "pytest<9"
      - name: Run tests
        run: pytest tests/ -v
