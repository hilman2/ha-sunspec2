name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check custom_components/ tests/
      - name: Ruff format check
        run: ruff format --check custom_components/ tests/

  hassfest:
    name: Hassfest (HA manifest validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install everything in one resolver pass with --upgrade so the
          # transitive deps (aiohttp, aiodns, pycares) all converge on
          # mutually-compatible latest versions. Without --upgrade, pip
          # picks an older pycares that lacks the ares_query_a_result
          # symbol that the latest aiodns expects, and the test session
          # fails on plugin load.
          #
          # pytest is pinned <9 because pytest 9.x changed the async-fixture
          # handler in a way that breaks pytest-homeassistant-custom-component.
          # See REWRITE_PLAN.md Phase 1 findings.
          pip install --upgrade \
            homeassistant \
            "pytest<9" \
            pytest-homeassistant-custom-component \
            pytest-mock \
            "pysunspec2[serial]==1.3.3" \
            pycares aiodns
      - name: Run tests
        run: pytest tests/ -v
