name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check custom_components/ tests/
      - name: Ruff format check
        run: ruff format --check custom_components/ tests/

  hassfest:
    name: Hassfest (HA manifest validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # pytest-homeassistant-custom-component is pinned to a known-good
          # version that ships an aiodns 4.x compatible pin for its
          # transitive deps. Older versions (~0.13.297 and below) end up
          # with aiodns 3.5.0 which has a broken `pycares.ares_query_a_result`
          # type annotation that triggers an AttributeError on plugin load
          # under Python 3.13.
          #
          # pytest is pinned <9 because pytest 9.x changed the async-fixture
          # handler in a way that breaks pytest-homeassistant-custom-component.
          # See REWRITE_PLAN.md Phase 1 findings.
          pip install \
            "pytest<9" \
            "pytest-homeassistant-custom-component>=0.13.316" \
            pytest-mock \
            "pysunspec2[serial]==1.3.3"
      - name: Run tests
        run: pytest tests/ -v
